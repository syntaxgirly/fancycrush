<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fancy Crush</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap");

    :root {
      --size: clamp(38px, 10.5vw, 56px);
      --gap: clamp(4px, 1.1vw, 6px);
      --board-bg: rgba(27, 38, 92, 0.74);
      --tile-bg: #10152e;
      --tile-radius: clamp(12px, 3.2vw, 18px);
      --text: #f7f8ff;
      --board-pad: clamp(9px, 2.2vw, 12px);
      --surface-glass: rgba(15, 21, 60, 0.68);
      --accent-cyan: #69ddff;
      --accent-pink: #ff6ecf;
      --card-gap: clamp(14px, 3vw, 22px);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Plus Jakarta Sans", Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(95% 110% at 15% 12%, rgba(188, 216, 255, 0.52) 0%, rgba(188, 216, 255, 0) 62%),
        radial-gradient(90% 95% at 85% 8%, rgba(243, 196, 255, 0.44) 0%, rgba(243, 196, 255, 0) 66%),
        linear-gradient(175deg, #a5b9ff 0%, #7f9bf3 24%, #4d69d5 55%, #2f3b8f 100%);
      color: var(--text);
      padding: clamp(12px, 4vw, 30px);
    }

    .game {
      width: min(100%, 560px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0) 28%),
        var(--surface-glass);
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: clamp(18px, 4vw, 26px);
      padding: clamp(14px, 4vw, 24px);
      box-shadow:
        0 18px 48px rgba(30, 41, 101, 0.44),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(10px) saturate(125%);
      position: relative;
      overflow: hidden;
      display: grid;
      gap: var(--card-gap);
    }

    .game::before {
      content: "";
      position: absolute;
      inset: -30% -10% auto;
      height: 210px;
      background: radial-gradient(circle at center, rgba(105, 221, 255, 0.22), rgba(255, 110, 207, 0.05) 48%, rgba(255, 255, 255, 0) 72%);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-family: "Outfit", "Plus Jakarta Sans", sans-serif;
      font-size: clamp(1.2rem, 4vw, 1.56rem);
      font-weight: 800;
      letter-spacing: 0.3px;
      line-height: 1;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .score-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .score {
      background: linear-gradient(140deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.1));
      border-radius: 999px;
      padding: 9px 14px;
      font-weight: 700;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 20px rgba(16, 21, 58, 0.28);
    }

    .combo {
      min-width: 92px;
      text-align: center;
      padding: 8px 10px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.3px;
      border-radius: 999px;
      color: #fff8ef;
      background: linear-gradient(135deg, rgba(255, 185, 102, 0.9), rgba(236, 111, 47, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: 0 8px 20px rgba(236, 111, 47, 0.3);
      opacity: 0;
      transform: translateY(-4px) scale(0.94);
      transition: opacity 260ms ease, transform 260ms ease;
      pointer-events: none;
    }

    .combo.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      color: #eff2ff;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
      padding: 9px 13px;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: transform 150ms ease, background 150ms ease, box-shadow 150ms ease;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.18);
    }

    .menu-btn:hover {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.1));
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.24);
    }

    .menu-btn:active {
      transform: translateY(0);
    }

    .menu-btn.hidden {
      display: none;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, var(--size));
      grid-template-rows: repeat(8, var(--size));
      gap: var(--gap);
      width: max-content;
      margin-inline: auto;
      background: var(--board-bg);
      border-radius: 24px;
      padding: var(--board-pad);
      user-select: none;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), inset 0 -14px 28px rgba(0,0,0,0.3), 0 18px 30px rgba(11,16,48,0.38);
      background-image: radial-gradient(circle at 50% -20%, rgba(255,255,255,0.2), rgba(255,255,255,0) 58%);
    }

    .tile {
      position: relative;
      width: var(--size);
      height: var(--size);
      border-radius: var(--tile-radius);
      border: 1px solid rgba(255, 255, 255, 0.36);
      background: var(--tile-bg);
      overflow: hidden;
      box-shadow:
        0 10px 14px rgba(0, 0, 0, 0.26),
        0 4px 0 rgba(255, 255, 255, 0.22) inset,
        0 -10px 12px rgba(0, 0, 0, 0.25) inset;
      transition: transform 0.2s ease, opacity 0.14s ease, filter 0.2s ease, box-shadow 0.2s ease;
      will-change: transform, filter;
      cursor: grab;
      touch-action: manipulation;
      isolation: isolate;
    }

    .tile::before,
    .tile::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .tile::before {
      inset: 2px;
      border-radius: calc(var(--tile-radius) - 3px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      opacity: 0.7;
      z-index: 2;
    }

    .tile::after {
      inset: 5px 8px auto;
      height: 34%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0));
      z-index: 3;
      transform: translateY(0);
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .tile:hover {
      transform: translateY(-3px) scale(1.045);
      filter: saturate(1.15) brightness(1.08);
      box-shadow:
        0 15px 20px rgba(0, 0, 0, 0.32),
        0 5px 0 rgba(255, 255, 255, 0.27) inset,
        0 -12px 14px rgba(0, 0, 0, 0.24) inset;
    }

    .tile:hover::after {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .tile:active {
      transform: scale(0.92);
      filter: saturate(1.2);
      cursor: grabbing;
    }

    .tile.dragging {
      opacity: 0.58;
      animation: tile-bob 420ms ease-in-out infinite alternate;
    }
    .tile.selected {
      transform: translateY(-3px) scale(1.07);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.95), 0 14px 20px rgba(0, 0, 0, 0.34);
      animation: tile-pulse 660ms ease-in-out infinite alternate;
    }

    .tile.matching {
      animation: match-bounce 300ms cubic-bezier(0.22, 1.1, 0.32, 1) 1;
      z-index: 4;
    }

    .red    { background: radial-gradient(circle at 30% 24%, #ffafbf 0%, #ff6b85 32%, #eb2d58 68%, #b9153d 100%); }
    .blue   { background: radial-gradient(circle at 30% 24%, #a6ebff 0%, #63c8ff 34%, #268de9 70%, #0c62b8 100%); }
    .green  { background: radial-gradient(circle at 30% 24%, #c6ffd0 0%, #81e79a 34%, #34b660 70%, #1e7f42 100%); }
    .yellow { background: radial-gradient(circle at 30% 24%, #fff8b6 0%, #ffe979 34%, #ffbf31 70%, #df8e0c 100%); }
    .purple { background: radial-gradient(circle at 30% 24%, #efc4ff 0%, #d594ff 34%, #a95dea 70%, #7d31be 100%); }
    .orange { background: radial-gradient(circle at 30% 24%, #ffe2bc 0%, #ffc37d 34%, #ff9342 70%, #dc5d14 100%); }

    .hint {
      text-align: center;
      font-size: clamp(0.78rem, 2.8vw, 0.9rem);
      opacity: 0.96;
      margin: 0;
      padding: 10px 12px;
      border-radius: 14px;
      background: linear-gradient(130deg, rgba(255, 255, 255, 0.17), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 18px rgba(17, 24, 66, 0.2);
    }

    .playfield {
      position: relative;
      display: grid;
      justify-items: center;
      padding: clamp(10px, 2.8vw, 14px);
      border-radius: 24px;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.04));
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .start-screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 22px;
      z-index: 5;
      background: linear-gradient(165deg, rgba(15, 22, 59, 0.92), rgba(14, 12, 35, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .start-screen h2 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .start-screen p {
      margin: 0 0 16px;
      opacity: 0.9;
    }

    .start-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #20182b;
      cursor: pointer;
      background: linear-gradient(145deg, #ffe56a, #ffb932);
      box-shadow: 0 8px 22px rgba(255, 185, 50, 0.4);
      transition: transform 120ms ease, filter 120ms ease;
    }

    .start-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    .start-screen.hidden {
      display: none;
    }

    @media (max-width: 560px) {
      h1 {
        font-size: 1.05rem;
      }

      .topbar {
        gap: 12px;
      }

      .score-wrap {
        width: 100%;
        justify-content: space-between;
      }

      .playfield {
        padding: 9px;
      }
    }

    .explosion {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.5) 30%, rgba(255,255,255,0) 70%);
      animation: burst 520ms cubic-bezier(0.2, 0.75, 0.24, 1) forwards;
      mix-blend-mode: screen;
    }

    @keyframes tile-pulse {
      0% { transform: translateY(-2px) scale(1.045); }
      100% { transform: translateY(-4px) scale(1.07); }
    }

    @keyframes tile-bob {
      0% { transform: translateY(-1px) rotate(-0.5deg); }
      100% { transform: translateY(1px) rotate(0.5deg); }
    }

    @keyframes burst {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(1.8);
      }
    }

    @keyframes match-bounce {
      0% { transform: scale(1); filter: brightness(1); }
      32% { transform: scale(1.18); filter: brightness(1.22); }
      64% { transform: scale(0.95); filter: brightness(1.08); }
      100% { transform: scale(1); filter: brightness(1); }
    }
  </style>
</head>
<body>
  <main class="game">
    <div class="topbar">
      <div class="top-actions">
        <h1>Fancy Crush</h1>
        <button id="menu-btn" class="menu-btn hidden" type="button">Back to menu</button>
      </div>
      <div class="score-wrap">
        <div id="combo" class="combo" aria-live="polite"></div>
        <div class="score">Score: <span id="score">0</span></div>
      </div>
    </div>

    <div class="playfield">
      <div id="board" class="board" aria-label="Candy board"></div>
      <div id="start-screen" class="start-screen">
        <div>
          <h2>Ready to play?</h2>
          <p>Press start to begin.</p>
          <button id="start-btn" class="start-btn" type="button">Start Game</button>
        </div>
      </div>
    </div>
    <p class="hint">Drag or tap a tile, then tap a neighbor to swap.</p>
  </main>

  <script>
    (() => {
      const SIZE = 8;
      const COLORS = ["red", "blue", "green", "yellow", "purple", "orange"];
      const MATCH_POINTS = 10;
      const CHAIN_MULTIPLIER = 1.35;
      const SWAP_REVERT_DELAY = 240;
      const REMOVE_PAUSE = 300;
      const COLLAPSE_PAUSE = 320;
      const MOVE_ANIM_MIN = 240;
      const MOVE_ANIM_MAX = 520;
      const MOVE_ANIM_PER_PIXEL = 2.6;
      const boardEl = document.getElementById("board");
      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo");
      const startScreenEl = document.getElementById("start-screen");
      const startBtnEl = document.getElementById("start-btn");
      const menuBtnEl = document.getElementById("menu-btn");

      let nextTileId = 1;
      const board = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      const tileEls = new Map();
      let score = 0;
      let dragged = null;
      let busy = false;
      let gameStarted = false;
      let comboMessageTimeout;
      let selectedTile = null;

      const randomColor = () => COLORS[Math.floor(Math.random() * COLORS.length)];
      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const createTile = () => ({ id: nextTileId++, color: randomColor() });
      const createSafeTile = (r, c) => {
        const availableColors = [...COLORS];

        for (let i = availableColors.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [availableColors[i], availableColors[j]] = [availableColors[j], availableColors[i]];
        }

        for (const color of availableColors) {
          const createsHorizontalMatch =
            c >= 2 &&
            board[r][c - 1] &&
            board[r][c - 2] &&
            board[r][c - 1].color === color &&
            board[r][c - 2].color === color;
          const createsVerticalMatch =
            r >= 2 &&
            board[r - 1][c] &&
            board[r - 2][c] &&
            board[r - 1][c].color === color &&
            board[r - 2][c].color === color;

          if (!createsHorizontalMatch && !createsVerticalMatch) {
            return { id: nextTileId++, color };
          }
        }

        return createTile();
      };

      function updateScore(points) {
        score += points;
        scoreEl.textContent = score;
      }

      function resetGameState() {
        score = 0;
        scoreEl.textContent = "0";
        dragged = null;
        selectedTile = null;
        nextTileId = 1;
        clearTimeout(comboMessageTimeout);
        comboEl.textContent = "";
        comboEl.classList.remove("show");
        tileEls.clear();
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            board[r][c] = null;
          }
        }
      }

      function showCombo(chain, bonus) {
        if (chain <= 0) return;
        comboEl.textContent = `${chain + 1}x COMBO +${bonus}`;
        comboEl.classList.add("show");
        clearTimeout(comboMessageTimeout);
        comboMessageTimeout = setTimeout(() => comboEl.classList.remove("show"), 1100);
      }

      function isAdjacent(a, b) {
        return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;
      }

      function swap(a, b) {
        [board[a.r][a.c], board[b.r][b.c]] = [board[b.r][b.c], board[a.r][a.c]];
      }

      function findMatches() {
        const matched = new Set();

        for (let r = 0; r < SIZE; r++) {
          let runStart = 0;
          for (let c = 1; c <= SIZE; c++) {
            const same = c < SIZE && board[r][c] && board[r][c].color === board[r][runStart].color;
            if (!same) {
              const runLen = c - runStart;
              if (board[r][runStart] && runLen >= 3) {
                for (let i = runStart; i < c; i++) matched.add(`${r},${i}`);
              }
              runStart = c;
            }
          }
        }

        for (let c = 0; c < SIZE; c++) {
          let runStart = 0;
          for (let r = 1; r <= SIZE; r++) {
            const same = r < SIZE && board[r][c] && board[r][c].color === board[runStart][c].color;
            if (!same) {
              const runLen = r - runStart;
              if (board[runStart][c] && runLen >= 3) {
                for (let i = runStart; i < r; i++) matched.add(`${i},${c}`);
              }
              runStart = r;
            }
          }
        }

        return matched;
      }

      function spawnExplosionAt(r, c, color) {
        const css = getComputedStyle(document.documentElement);
        const tileSize = parseFloat(css.getPropertyValue("--size")) || 56;
        const gap = parseFloat(css.getPropertyValue("--gap")) || 6;
        const boardPad = parseFloat(css.getPropertyValue("--board-pad")) || 10;
        const centerX = boardPad + c * (tileSize + gap) + tileSize / 2;
        const centerY = boardPad + r * (tileSize + gap) + tileSize / 2;
        const rays = 8;

        for (let i = 0; i < rays; i++) {
          const spark = document.createElement("span");
          const angle = (Math.PI * 2 * i) / rays;
          const distance = 8 + Math.random() * 24;
          spark.className = "explosion";
          spark.style.left = `${centerX}px`;
          spark.style.top = `${centerY}px`;
          spark.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
          spark.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
          spark.style.background = `radial-gradient(circle at center, rgba(255,255,255,0.95), ${color}, rgba(255,255,255,0))`;
          spark.addEventListener("animationend", () => spark.remove());
          boardEl.appendChild(spark);
        }
      }

      function removeMatches(matched, chain = 0) {
        for (const key of matched) {
          const [r, c] = key.split(",").map(Number);
          const tile = board[r][c];
          if (!tile) continue;
          const el = tileEls.get(tile.id);
          if (el) {
            const computed = getComputedStyle(el).backgroundColor || "rgba(255,255,255,0.8)";
            spawnExplosionAt(r, c, computed);
          }
          tileEls.delete(tile.id);
          board[r][c] = null;
        }

        if (matched.size > 0) {
          const basePoints = matched.size * MATCH_POINTS;
          const chainBonus = Math.round(basePoints * chain * CHAIN_MULTIPLIER);
          updateScore(basePoints + chainBonus);
          showCombo(chain, chainBonus);
        }
      }

      function collapseColumns() {
        for (let c = 0; c < SIZE; c++) {
          const nonNull = [];
          let createdCount = 0;
          for (let r = SIZE - 1; r >= 0; r--) {
            if (board[r][c] !== null) nonNull.push(board[r][c]);
          }

          for (let r = SIZE - 1, i = 0; r >= 0; r--, i++) {
            if (i < nonNull.length) {
              const tile = nonNull[i];
              tile.spawnOffset = 0;
              board[r][c] = tile;
            } else {
              const tile = createTile();
              createdCount += 1;
              tile.spawnOffset = createdCount;
              board[r][c] = tile;
            }
          }
        }
      }

      function render() {
        const previousRects = new Map();

        for (const [id, el] of tileEls.entries()) {
          previousRects.set(id, el.getBoundingClientRect());
        }

        const usedIds = new Set();
        const fragment = document.createDocumentFragment();

        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const tile = board[r][c];
            if (!tile) continue;

            let el = tileEls.get(tile.id);
            if (!el) {
              el = document.createElement("div");
              el.className = "tile";
              el.draggable = true;
              el.addEventListener("dragstart", onDragStart);
              el.addEventListener("dragend", onDragEnd);
              el.addEventListener("dragover", (e) => e.preventDefault());
              el.addEventListener("drop", onDrop);
              el.addEventListener("click", onTileSelect);
              tileEls.set(tile.id, el);
            }

            el.className = `tile ${tile.color}`;
            el.dataset.r = r;
            el.dataset.c = c;
            el.classList.toggle("selected", selectedTile?.r === r && selectedTile?.c === c);
            usedIds.add(tile.id);
            fragment.appendChild(el);
          }
        }

        for (const [id, el] of tileEls.entries()) {
          if (!usedIds.has(id)) {
            el.remove();
            tileEls.delete(id);
          }
        }

        boardEl.replaceChildren(fragment, ...boardEl.querySelectorAll('.explosion'));

        for (const [id, el] of tileEls.entries()) {
          const tile = board[Number(el.dataset.r)]?.[Number(el.dataset.c)];
          const oldRect = previousRects.get(id);
          const newRect = el.getBoundingClientRect();
          let dx = 0;
          let dy = 0;

          if (oldRect) {
            dx = oldRect.left - newRect.left;
            dy = oldRect.top - newRect.top;
          } else if (tile?.spawnOffset > 0) {
            const css = getComputedStyle(document.documentElement);
            const tileSize = parseFloat(css.getPropertyValue("--size")) || 56;
            const gap = parseFloat(css.getPropertyValue("--gap")) || 6;
            dy = -(tileSize + gap) * tile.spawnOffset;
          }

          if (dx !== 0 || dy !== 0) {
            const distance = Math.hypot(dx, dy);
            const duration = Math.max(
              MOVE_ANIM_MIN,
              Math.min(MOVE_ANIM_MAX, Math.round(distance * MOVE_ANIM_PER_PIXEL))
            );
            el.animate(
              [
                { transform: `translate(${dx}px, ${dy}px)` },
                { transform: "translate(0, 0)" }
              ],
              { duration, easing: "cubic-bezier(0.22, 0.9, 0.2, 1)" }
            );
          }

          if (tile && tile.spawnOffset !== undefined) {
            delete tile.spawnOffset;
          }
        }
      }

      function animateMatch(matched) {
        const animations = [];
        for (const key of matched) {
          const [r, c] = key.split(",").map(Number);
          const tile = board[r][c];
          if (!tile) continue;
          const el = tileEls.get(tile.id);
          if (!el) continue;
          el.classList.add("matching");
          const finished = el.getAnimations().map((anim) => anim.finished.catch(() => null));
          const settle = Promise.allSettled(finished).then(() => {
            el.classList.remove("matching");
          });
          animations.push(settle);
        }
        return Promise.allSettled(animations);
      }

      async function resolveBoard() {
        let chain = 0;
        let matched = findMatches();

        while (matched.size > 0) {
          await animateMatch(matched);
          removeMatches(matched, chain);
          render();
          await wait(REMOVE_PAUSE);
          collapseColumns();
          render();
          await wait(COLLAPSE_PAUSE);
          matched = findMatches();
          chain += 1;
        }
      }

      async function attemptSwap(from, to) {
        if (!isAdjacent(from, to)) return;

        swap(from, to);
        render();

        const matched = findMatches();
        if (matched.size === 0) {
          await wait(SWAP_REVERT_DELAY);
          swap(from, to);
          render();
          return;
        }

        await resolveBoard();
      }

      function onDragStart(e) {
        if (busy || !gameStarted) {
          e.preventDefault();
          return;
        }
        dragged = {
          r: Number(e.target.dataset.r),
          c: Number(e.target.dataset.c)
        };
        e.target.classList.add("dragging");
      }

      function onDragEnd(e) {
        e.target.classList.remove("dragging");
      }

      async function onDrop(e) {
        e.preventDefault();
        if (!dragged || busy) return;

        const target = {
          r: Number(e.currentTarget.dataset.r),
          c: Number(e.currentTarget.dataset.c)
        };

        busy = true;
        await attemptSwap(dragged, target);
        dragged = null;
        busy = false;
      }

      async function onTileSelect(e) {
        if (busy || !gameStarted) return;

        const target = {
          r: Number(e.currentTarget.dataset.r),
          c: Number(e.currentTarget.dataset.c)
        };

        if (!selectedTile) {
          selectedTile = target;
          render();
          return;
        }

        if (selectedTile.r === target.r && selectedTile.c === target.c) {
          selectedTile = null;
          render();
          return;
        }

        busy = true;
        await attemptSwap(selectedTile, target);
        selectedTile = null;
        busy = false;
        render();
      }

      async function initGame() {
        resetGameState();
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            board[r][c] = createSafeTile(r, c);
          }
        }

        render();
      }

      startBtnEl.addEventListener("click", async () => {
        if (busy) return;
        busy = true;
        gameStarted = true;
        menuBtnEl.classList.remove("hidden");
        startScreenEl.classList.add("hidden");
        await initGame();
        busy = false;
      });

      menuBtnEl.addEventListener("click", () => {
        if (busy) return;
        gameStarted = false;
        selectedTile = null;
        menuBtnEl.classList.add("hidden");
        resetGameState();
        boardEl.replaceChildren();
        startScreenEl.classList.remove("hidden");
      });
    })();
  </script>
</body>
</html>
