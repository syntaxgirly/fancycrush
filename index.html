<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fancy Crush</title>
  <style>
    :root {
      --size: 56px;
      --gap: 6px;
      --board-bg: rgba(17, 27, 64, 0.82);
      --tile-bg: #10152e;
      --text: #f4f5ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background:
        radial-gradient(70% 90% at 18% 14%, rgba(128, 168, 255, 0.45) 0%, rgba(128, 168, 255, 0) 70%),
        radial-gradient(85% 80% at 82% 10%, rgba(213, 118, 255, 0.35) 0%, rgba(213, 118, 255, 0) 72%),
        linear-gradient(165deg, #364fa8 0%, #1d2958 42%, #120f2f 100%);
      color: var(--text);
      padding: 24px;
    }

    .game {
      width: min(100%, 560px);
      background: rgba(8, 12, 35, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(4px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.2px;
    }

    .score-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .combo {
      min-width: 92px;
      text-align: center;
      padding: 8px 10px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.3px;
      border-radius: 999px;
      color: #fff8ef;
      background: linear-gradient(135deg, rgba(255, 185, 102, 0.9), rgba(236, 111, 47, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: 0 8px 20px rgba(236, 111, 47, 0.3);
      opacity: 0;
      transform: translateY(-4px) scale(0.94);
      transition: opacity 170ms ease, transform 170ms ease;
      pointer-events: none;
    }

    .combo.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, var(--size));
      grid-template-rows: repeat(8, var(--size));
      gap: var(--gap);
      width: max-content;
      margin-inline: auto;
      background: var(--board-bg);
      border-radius: 16px;
      padding: 10px;
      user-select: none;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 -10px 24px rgba(0,0,0,0.22);
    }

    .tile {
      position: relative;
      width: var(--size);
      height: var(--size);
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.28);
      background: var(--tile-bg);
      overflow: hidden;
      box-shadow:
        0 7px 10px rgba(0, 0, 0, 0.22),
        inset 0 7px 10px rgba(255, 255, 255, 0.2),
        inset 0 -9px 10px rgba(0, 0, 0, 0.22);
      transition: transform 0.16s ease, opacity 0.12s ease, filter 0.16s ease, box-shadow 0.16s ease;
      will-change: transform;
      cursor: grab;
    }

    .tile::after {
      content: "";
      position: absolute;
      inset: 5px 8px auto;
      height: 34%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0));
      pointer-events: none;
    }

    .tile:hover {
      transform: translateY(-2px) scale(1.035);
      filter: saturate(1.08) brightness(1.05);
      box-shadow:
        0 11px 18px rgba(0, 0, 0, 0.3),
        inset 0 7px 10px rgba(255, 255, 255, 0.24),
        inset 0 -10px 12px rgba(0, 0, 0, 0.22);
    }

    .tile:active {
      transform: scale(0.94);
      cursor: grabbing;
    }

    .tile.dragging { opacity: 0.55; }

    .red    { background: linear-gradient(145deg, #ff5a6b, #d92744); }
    .blue   { background: linear-gradient(145deg, #4ab4ff, #197fd9); }
    .green  { background: linear-gradient(145deg, #5fd87a, #2da955); }
    .yellow { background: linear-gradient(145deg, #ffe56a, #f2b51b); }
    .purple { background: linear-gradient(145deg, #cc83ff, #8c46d8); }
    .orange { background: linear-gradient(145deg, #ffb971, #ee7b24); }

    .hint {
      margin-top: 14px;
      text-align: center;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .playfield {
      position: relative;
    }

    .start-screen {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      border-radius: 16px;
      z-index: 5;
      background: linear-gradient(165deg, rgba(15, 22, 59, 0.92), rgba(14, 12, 35, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .start-screen h2 {
      margin: 0 0 8px;
      font-size: 1.3rem;
    }

    .start-screen p {
      margin: 0 0 16px;
      opacity: 0.9;
    }

    .start-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #20182b;
      cursor: pointer;
      background: linear-gradient(145deg, #ffe56a, #ffb932);
      box-shadow: 0 8px 22px rgba(255, 185, 50, 0.4);
      transition: transform 120ms ease, filter 120ms ease;
    }

    .start-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    .start-screen.hidden {
      display: none;
    }

    .explosion {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle at center, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.5) 30%, rgba(255,255,255,0) 70%);
      animation: burst 340ms ease-out forwards;
      mix-blend-mode: screen;
    }

    @keyframes burst {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.2);
      }
      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(1.8);
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <div class="topbar">
      <h1>Fancy Crush</h1>
      <div class="score-wrap">
        <div id="combo" class="combo" aria-live="polite"></div>
        <div class="score">Score: <span id="score">0</span></div>
      </div>
    </div>

    <div class="playfield">
      <div id="board" class="board" aria-label="Candy board"></div>
      <div id="start-screen" class="start-screen">
        <div>
          <h2>Ready to play?</h2>
          <p>Press start to begin.</p>
          <button id="start-btn" class="start-btn" type="button">Start Game</button>
        </div>
      </div>
    </div>
    <p class="hint">Drag one tile onto a neighbor to swap.</p>
  </main>

  <script>
    (() => {
      const SIZE = 8;
      const COLORS = ["red", "blue", "green", "yellow", "purple", "orange"];
      const MATCH_POINTS = 10;
      const CHAIN_MULTIPLIER = 1.35;
      const boardEl = document.getElementById("board");
      const scoreEl = document.getElementById("score");
      const comboEl = document.getElementById("combo");
      const startScreenEl = document.getElementById("start-screen");
      const startBtnEl = document.getElementById("start-btn");

      let nextTileId = 1;
      const board = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      const tileEls = new Map();
      let score = 0;
      let dragged = null;
      let busy = false;
      let gameStarted = false;
      let comboMessageTimeout;

      const randomColor = () => COLORS[Math.floor(Math.random() * COLORS.length)];
      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      const createTile = () => ({ id: nextTileId++, color: randomColor() });
      const createSafeTile = (r, c) => {
        const availableColors = [...COLORS];

        for (let i = availableColors.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [availableColors[i], availableColors[j]] = [availableColors[j], availableColors[i]];
        }

        for (const color of availableColors) {
          const createsHorizontalMatch =
            c >= 2 &&
            board[r][c - 1] &&
            board[r][c - 2] &&
            board[r][c - 1].color === color &&
            board[r][c - 2].color === color;
          const createsVerticalMatch =
            r >= 2 &&
            board[r - 1][c] &&
            board[r - 2][c] &&
            board[r - 1][c].color === color &&
            board[r - 2][c].color === color;

          if (!createsHorizontalMatch && !createsVerticalMatch) {
            return { id: nextTileId++, color };
          }
        }

        return createTile();
      };

      function updateScore(points) {
        score += points;
        scoreEl.textContent = score;
      }

      function resetGameState() {
        score = 0;
        scoreEl.textContent = "0";
        dragged = null;
        nextTileId = 1;
        clearTimeout(comboMessageTimeout);
        comboEl.textContent = "";
        comboEl.classList.remove("show");
        tileEls.clear();
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            board[r][c] = null;
          }
        }
      }

      function showCombo(chain, bonus) {
        if (chain <= 0) return;
        comboEl.textContent = `${chain + 1}x COMBO +${bonus}`;
        comboEl.classList.add("show");
        clearTimeout(comboMessageTimeout);
        comboMessageTimeout = setTimeout(() => comboEl.classList.remove("show"), 750);
      }

      function isAdjacent(a, b) {
        return Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1;
      }

      function swap(a, b) {
        [board[a.r][a.c], board[b.r][b.c]] = [board[b.r][b.c], board[a.r][a.c]];
      }

      function findMatches() {
        const matched = new Set();

        for (let r = 0; r < SIZE; r++) {
          let runStart = 0;
          for (let c = 1; c <= SIZE; c++) {
            const same = c < SIZE && board[r][c] && board[r][c].color === board[r][runStart].color;
            if (!same) {
              const runLen = c - runStart;
              if (board[r][runStart] && runLen >= 3) {
                for (let i = runStart; i < c; i++) matched.add(`${r},${i}`);
              }
              runStart = c;
            }
          }
        }

        for (let c = 0; c < SIZE; c++) {
          let runStart = 0;
          for (let r = 1; r <= SIZE; r++) {
            const same = r < SIZE && board[r][c] && board[r][c].color === board[runStart][c].color;
            if (!same) {
              const runLen = r - runStart;
              if (board[runStart][c] && runLen >= 3) {
                for (let i = runStart; i < r; i++) matched.add(`${i},${c}`);
              }
              runStart = r;
            }
          }
        }

        return matched;
      }

      function spawnExplosionAt(r, c, color) {
        const centerX = 10 + c * (56 + 6) + 28;
        const centerY = 10 + r * (56 + 6) + 28;
        const rays = 8;

        for (let i = 0; i < rays; i++) {
          const spark = document.createElement("span");
          const angle = (Math.PI * 2 * i) / rays;
          const distance = 8 + Math.random() * 24;
          spark.className = "explosion";
          spark.style.left = `${centerX}px`;
          spark.style.top = `${centerY}px`;
          spark.style.setProperty("--dx", `${Math.cos(angle) * distance}px`);
          spark.style.setProperty("--dy", `${Math.sin(angle) * distance}px`);
          spark.style.background = `radial-gradient(circle at center, rgba(255,255,255,0.95), ${color}, rgba(255,255,255,0))`;
          spark.addEventListener("animationend", () => spark.remove());
          boardEl.appendChild(spark);
        }
      }

      function removeMatches(matched, chain = 0) {
        for (const key of matched) {
          const [r, c] = key.split(",").map(Number);
          const tile = board[r][c];
          if (!tile) continue;
          const el = tileEls.get(tile.id);
          if (el) {
            const computed = getComputedStyle(el).backgroundColor || "rgba(255,255,255,0.8)";
            spawnExplosionAt(r, c, computed);
          }
          tileEls.delete(tile.id);
          board[r][c] = null;
        }

        if (matched.size > 0) {
          const basePoints = matched.size * MATCH_POINTS;
          const chainBonus = Math.round(basePoints * chain * CHAIN_MULTIPLIER);
          updateScore(basePoints + chainBonus);
          showCombo(chain, chainBonus);
        }
      }

      function collapseColumns() {
        for (let c = 0; c < SIZE; c++) {
          const nonNull = [];
          for (let r = SIZE - 1; r >= 0; r--) {
            if (board[r][c] !== null) nonNull.push(board[r][c]);
          }

          for (let r = SIZE - 1, i = 0; r >= 0; r--, i++) {
            board[r][c] = i < nonNull.length ? nonNull[i] : createTile();
          }
        }
      }

      function render() {
        const previousRects = new Map();

        for (const [id, el] of tileEls.entries()) {
          previousRects.set(id, el.getBoundingClientRect());
        }

        const usedIds = new Set();
        const fragment = document.createDocumentFragment();

        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const tile = board[r][c];
            if (!tile) continue;

            let el = tileEls.get(tile.id);
            if (!el) {
              el = document.createElement("div");
              el.className = "tile";
              el.draggable = true;
              el.addEventListener("dragstart", onDragStart);
              el.addEventListener("dragend", onDragEnd);
              el.addEventListener("dragover", (e) => e.preventDefault());
              el.addEventListener("drop", onDrop);
              tileEls.set(tile.id, el);
            }

            el.className = `tile ${tile.color}`;
            el.dataset.r = r;
            el.dataset.c = c;
            usedIds.add(tile.id);
            fragment.appendChild(el);
          }
        }

        for (const [id, el] of tileEls.entries()) {
          if (!usedIds.has(id)) {
            el.remove();
            tileEls.delete(id);
          }
        }

        boardEl.replaceChildren(fragment, ...boardEl.querySelectorAll('.explosion'));

        for (const [id, el] of tileEls.entries()) {
          const oldRect = previousRects.get(id);
          if (!oldRect) continue;
          const newRect = el.getBoundingClientRect();
          const dx = oldRect.left - newRect.left;
          const dy = oldRect.top - newRect.top;
          if (dx !== 0 || dy !== 0) {
            const distance = Math.hypot(dx, dy);
            const duration = Math.max(150, Math.min(360, Math.round(distance * 1.7)));
            el.animate(
              [
                { transform: `translate(${dx}px, ${dy}px)` },
                { transform: "translate(0, 0)" }
              ],
              { duration, easing: "cubic-bezier(0.18, 0.82, 0.27, 1)" }
            );
          }
        }
      }

      async function resolveBoard() {
        let chain = 0;
        let matched = findMatches();

        while (matched.size > 0) {
          removeMatches(matched, chain);
          render();
          await wait(180);
          collapseColumns();
          render();
          await wait(200);
          matched = findMatches();
          chain += 1;
        }
      }

      async function attemptSwap(from, to) {
        if (!isAdjacent(from, to)) return;

        swap(from, to);
        render();

        const matched = findMatches();
        if (matched.size === 0) {
          await wait(170);
          swap(from, to);
          render();
          return;
        }

        await resolveBoard();
      }

      function onDragStart(e) {
        if (busy || !gameStarted) {
          e.preventDefault();
          return;
        }
        dragged = {
          r: Number(e.target.dataset.r),
          c: Number(e.target.dataset.c)
        };
        e.target.classList.add("dragging");
      }

      function onDragEnd(e) {
        e.target.classList.remove("dragging");
      }

      async function onDrop(e) {
        e.preventDefault();
        if (!dragged || busy) return;

        const target = {
          r: Number(e.currentTarget.dataset.r),
          c: Number(e.currentTarget.dataset.c)
        };

        busy = true;
        await attemptSwap(dragged, target);
        dragged = null;
        busy = false;
      }

      async function initGame() {
        resetGameState();
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            board[r][c] = createSafeTile(r, c);
          }
        }

        render();
      }

      startBtnEl.addEventListener("click", async () => {
        if (busy) return;
        busy = true;
        gameStarted = true;
        startScreenEl.classList.add("hidden");
        await initGame();
        busy = false;
      });
    })();
  </script>
</body>
</html>
